<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>觅游 · 场景发现</title>
<style>
  :root {
    --green:#21B443; --gl:#E9FBED; --gd:#00994D;
    --bg:#F7F9FA; --sf:#fff;
    --t90:rgba(17,25,37,.9); --t75:rgba(17,25,37,.75);
    --t60:rgba(17,25,37,.6); --t40:rgba(17,25,37,.4);
    --bd:rgba(17,25,37,.06); --bds:rgba(17,25,37,.12);
    --blue:#0E65E8; --r:12px; --rs:8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: FZLanTingYuanS-R-GB, ui-sans-serif, system-ui, sans-serif;
    background: var(--bg);
    display: flex;
    height: 100vh;
    overflow: hidden;
    color: var(--t90);
  }
  /* Main scroll area */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* Search hero */
  .hero {
    background: linear-gradient(135deg, #21B443, #00BABE);
    padding: 40px 32px;
    flex-shrink: 0;
  }
  .hero h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .hero p { color: rgba(255,255,255,.85); font-size: 14px; margin-bottom: 20px; }
  .search-box {
    display: flex; align-items: center;
    background: #fff; border-radius: 12px; height: 48px;
    padding: 0 16px; gap: 10px;
  }
  .search-box input {
    flex: 1; border: none; outline: none;
    font-size: 15px; color: var(--t90);
    font-family: inherit; background: transparent;
  }
  .search-box input::placeholder { color: var(--t40); }
  .result-title {
    display: none; color: #fff; font-size: 13px;
    margin-top: 10px; font-weight: 600;
  }
  .hot-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .hot-tag {
    background: rgba(255,255,255,.2); color: #fff;
    border-radius: 20px; padding: 4px 12px;
    font-size: 13px; cursor: pointer; border: none;
    font-family: inherit; transition: background .15s;
  }
  .hot-tag:hover { background: rgba(255,255,255,.35); }

  /* Tab bar */
  .tab-bar {
    position: sticky; top: 0; z-index: 10;
    background: #fff; border-bottom: 1px solid var(--bd);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    min-height: 48px; flex-shrink: 0;
  }
  .tab-left { display: flex; align-items: center; gap: 4px; }
  .tab-label { font-size: 11px; color: var(--t40); margin-right: 8px; white-space: nowrap; }
  .tab-a {
    padding: 14px 14px; font-size: 14px; cursor: pointer;
    color: var(--t60); border: none; background: none;
    font-family: inherit; border-bottom: 2px solid transparent;
    transition: color .15s; white-space: nowrap;
  }
  .tab-a.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .scene-label { font-size: 11px; color: var(--t40); margin-right: 4px; white-space: nowrap; }
  .badge-new {
    background: var(--green); color: #fff;
    font-size: 10px; border-radius: 4px; padding: 1px 4px; margin-right: 4px;
  }
  .scene-btn {
    border-radius: 20px; padding: 5px 12px; font-size: 13px;
    cursor: pointer; border: 1px solid transparent;
    background: var(--bd); color: var(--t75);
    font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .scene-btn.active {
    background: var(--gl); color: var(--green);
    border-color: var(--green);
  }

  /* Results grid */
  .results {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 20px; padding: 24px 32px;
    flex: 1;
  }
  .col-header { font-weight: 600; font-size: 14px; margin-bottom: 12px; color: var(--t90); }

  /* Recipe cards */
  .recipe-card {
    background: #fff; border-radius: 12px; padding: 16px;
    border-left: 3px solid var(--green);
    box-shadow: 0 1px 4px rgba(17,25,37,.06);
    margin-bottom: 12px;
  }
  .recipe-title { font-weight: 600; font-size: 14px; margin-bottom: 8px; }
  .recipe-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .skill-tag {
    background: var(--bd); color: var(--t60);
    border-radius: 4px; padding: 2px 6px; font-size: 12px;
  }
  .recipe-stats { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .success-rate { color: var(--green); font-size: 12px; font-weight: 600; }
  .users-count { color: var(--t40); font-size: 12px; }
  .try-btn {
    width: 100%; background: var(--green); color: #fff;
    border: none; border-radius: 8px; padding: 6px 14px;
    font-size: 13px; cursor: pointer; font-family: inherit;
    transition: background .15s;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .try-btn:hover:not(.loading):not(.success) { background: var(--gd); }
  .try-btn.loading { background: #aaa; cursor: not-allowed; }
  .try-btn.success { background: #00994D; }

  /* Skill rows */
  .skill-card {
    background: #fff; border-radius: 12px; padding: 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(17,25,37,.06);
  }
  .skill-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gl); display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .skill-info { flex: 1; min-width: 0; }
  .skill-name { font-weight: 600; font-size: 14px; }
  .skill-ver { color: var(--t40); font-size: 12px; font-weight: 400; }
  .skill-dl { color: var(--t40); font-size: 12px; }
  .install-btn {
    background: var(--green); color: #fff;
    border: none; border-radius: 8px; padding: 5px 12px;
    font-size: 12px; cursor: pointer; font-family: inherit;
    white-space: nowrap; transition: background .15s; flex-shrink: 0;
  }
  .install-btn:hover:not(.installed) { background: var(--gd); }
  .install-btn.installed {
    background: var(--bd); color: var(--t60); cursor: default;
  }

  /* Discussion items */
  .disc-item {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    cursor: pointer; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(17,25,37,.06);
    transition: background .15s;
  }
  .disc-item:hover { background: var(--gl); }
  .disc-title { font-size: 14px; color: var(--t90); margin-bottom: 4px; }
  .disc-meta { font-size: 12px; color: var(--t40); }

  /* Toast */
  #toast {
    position: fixed; top: 20px; right: 20px; z-index: 999;
    background: var(--green); color: #fff;
    padding: 10px 18px; border-radius: 10px; font-size: 14px;
    box-shadow: 0 4px 16px rgba(33,180,67,.3);
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #toast.show { opacity: 1; }
</style>
</head>

</div>

// Persist installed state across re-renders
const installedSkills = new Set(['docx']);

// ── Render helpers ────────────────────────────────────────────────────────────
function renderRecipes(recipes) {
  return recipes.map(r => `
    <div class="recipe-card">
      <div class="recipe-title">${r.title}</div>
      <div class="recipe-meta">
        ${r.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
      </div>
      <div class="recipe-stats">
        <span class="success-rate">${r.rate} 成功率</span>
        <span class="users-count">${r.users}</span>
      </div>
      <button class="try-btn" onclick="tryRecipe(this)">🚀 让虾试试</button>
    </div>
  `).join('');
}

function renderSkills(skills) {
  return skills.map(s => {
    const inst = installedSkills.has(s.name);
    return `
      <div class="skill-card">
        <div class="skill-icon">${s.icon}</div>
        <div class="skill-info">
          <div class="skill-name">${s.name} <span class="skill-ver">${s.ver}</span></div>
          <div class="skill-dl">${s.dl}</div>
        </div>
        <button class="install-btn${inst ? ' installed' : ''}"
          onclick="installSkill(this,'${s.name}')">
          ${inst ? '已安装 ✓' : '安装'}
        </button>
      </div>
    `;
  }).join('');
}

function renderDiscs(discs) {
  return discs.map(d => `
    <div class="disc-item">
      <div class="disc-title">${d.title}</div>
      <div class="disc-meta">${d.meta}</div>
    </div>
  `).join('');
}

function renderScene(key) {
  const d = SCENES[key];
  document.getElementById('recipesCol').innerHTML = renderRecipes(d.recipes);
  document.getElementById('skillsCol').innerHTML  = renderSkills(d.skills);
  document.getElementById('discsCol').innerHTML   = renderDiscs(d.discs);
}

// ── Interactions ──────────────────────────────────────────────────────────────

// Path A tab: visual-only switch
function switchTabA(el) {
  document.querySelectorAll('.tab-a').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// Path B scene: re-render all 3 columns
function switchScene(el, scene) {
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderScene(scene);
}

// Hot tag: fill search + show result subtitle
function clickTag(text) {
  document.getElementById('searchInput').value = text;
  const rt = document.getElementById('resultTitle');
  rt.textContent = `「${text}」相关结果`;
  rt.style.display = 'block';
}

// Recipe try: loading → success → reset
function tryRecipe(btn) {
  if (btn.classList.contains('loading') || btn.classList.contains('success')) return;
  btn.classList.add('loading');
  btn.textContent = '⏳ 虾正在试...';

  setTimeout(() => {
    btn.classList.remove('loading');
    btn.classList.add('success');
    btn.textContent = '✅ 已加入任务队列！';
    showToast();

    setTimeout(() => {
      btn.classList.remove('success');
      btn.innerHTML = '🚀 让虾试试';
    }, 3000);
  }, 1800);
}

// Skill install toggle
function installSkill(btn, name) {
  if (btn.classList.contains('installed')) return;
  installedSkills.add(name);
  btn.classList.add('installed');
  btn.textContent = '已安装 ✓';
}

// Toast: appear then fade
function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderScene('办公效率');
</script>
